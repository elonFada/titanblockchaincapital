<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TitanBlockchainCapital | Admin Chat</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e4b84f",
              "background-dark": "#060913",
              "surface-dark": "#10172a",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Manrope", sans-serif;
        background:
          radial-gradient(
            circle at top right,
            rgba(228, 184, 79, 0.08),
            transparent 24%
          ),
          linear-gradient(180deg, #060913 0%, #070b14 45%, #09101b 100%);
      }

      .premium-panel {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.03)
        );
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
      }

      #adminChatMessages::-webkit-scrollbar,
      #chatUsersList::-webkit-scrollbar {
        width: 8px;
      }

      #adminChatMessages::-webkit-scrollbar-thumb,
      #chatUsersList::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }
    </style>
  </head>

  <body class="bg-background-dark text-white font-display min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-6">
      <div class="mb-6 flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-black">Support Chat</h1>
          <p class="text-slate-400 mt-2">
            View all users and reply to support messages.
          </p>
        </div>
        <a
          href="admin-dashboard.html"
          class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-white font-semibold"
        >
          Back
        </a>
      </div>

      <div class="grid lg:grid-cols-[340px_1fr] gap-6">
        <div class="premium-panel rounded-3xl p-4">
          <div class="mb-4">
            <input
              id="chatSearchInput"
              type="text"
              placeholder="Search user..."
              class="w-full rounded-2xl bg-white/5 border border-white/10 text-white px-4 py-3 outline-none"
            />
          </div>

          <div
            id="chatUsersList"
            class="space-y-3 max-h-[70vh] overflow-y-auto"
          ></div>
        </div>

        <div class="premium-panel rounded-3xl p-4 sm:p-5">
          <div class="border-b border-white/10 pb-4 mb-4">
            <h2 id="activeChatUserName" class="text-xl font-black">
              Select a user
            </h2>
            <p id="activeChatUserMeta" class="text-slate-400 text-sm mt-1">
              Open a conversation to view and reply.
            </p>
          </div>

          <div
            id="adminChatMessages"
            class="space-y-4 h-[55vh] overflow-y-auto rounded-2xl bg-white/[0.03] p-4"
          ></div>

          <form id="adminReplyForm" class="mt-4 space-y-3">
            <div class="relative">
              <textarea
                id="adminReplyInput"
                rows="3"
                placeholder="Type your reply..."
                class="w-full rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-slate-500 px-4 py-3 pr-14 outline-none resize-none"
              ></textarea>

              <button
                type="submit"
                class="absolute bottom-3 right-3 h-10 w-10 rounded-xl bg-primary text-black flex items-center justify-center font-bold"
              >
                <i data-lucide="send-horizontal" class="w-4 h-4"></i>
              </button>
            </div>

            <button
              id="adminAttachmentLabel"
              type="button"
              class="inline-flex items-center gap-2 text-sm font-semibold text-primary"
            >
              <i data-lucide="paperclip" class="w-4 h-4"></i>
              Attach file
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-chat.js"></script>
  </body>
</html>
