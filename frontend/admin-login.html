<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TitanBlockchainCapital | Admin Login</title>
    <!-- Tailwind + Fonts + Icons -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon placeholders (optional but kept from original) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="manifest" href="images/site.webmanifest" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            screens: { xs: "480px" },
            colors: {
              primary: "#e4b84f",
              "primary-deep": "#bb8920",
              accent: "#4b7cff",
              "accent-2": "#74e0ff",
              success: "#22c55e",
              danger: "#ef4444",
              warning: "#f59e0b",
              "background-dark": "#060913",
              "surface-dark": "#10172a",
              "surface-dark-2": "#151f36",
              "border-dark": "rgba(255,255,255,0.08)",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            boxShadow: {
              glow: "0 20px 80px rgba(228,184,79,0.18)",
              blue: "0 20px 80px rgba(75,124,255,0.18)",
              soft: "0 20px 60px rgba(0,0,0,0.4)",
            },
          },
        },
      };
    </script>
    <style>
      /* Global background + premium glass styles matching the original vision */
      body {
        font-family: "Manrope", sans-serif;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at top right,
            rgba(228, 184, 79, 0.08),
            transparent 24%
          ),
          radial-gradient(
            circle at left 20%,
            rgba(75, 124, 255, 0.1),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(116, 224, 255, 0.08),
            transparent 24%
          ),
          linear-gradient(180deg, #060913 0%, #070b14 45%, #09101b 100%);
      }

      .premium-panel {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.03)
        );
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .premium-border {
        position: relative;
      }

      .premium-border::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(228, 184, 79, 0.45),
          rgba(75, 124, 255, 0.18),
          rgba(255, 255, 255, 0.03)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
      }

      .gold-gradient {
        background: linear-gradient(
          135deg,
          #f6dea0 0%,
          #e4b84f 48%,
          #b47a15 100%
        );
      }

      .form-input {
        background: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: white !important;
        appearance: none;
      }

      .form-input::placeholder {
        color: rgb(148 163 184) !important;
      }

      .form-input:focus {
        background: rgba(255, 255, 255, 0.06) !important;
        border-color: rgba(228, 184, 79, 0.45) !important;
        box-shadow: 0 0 0 3px rgba(228, 184, 79, 0.08) !important;
        outline: none;
      }

      /* Custom checkbox style to match dark/glass aesthetic */
      input[type="checkbox"] {
        background-color: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
      }
      input[type="checkbox"]:checked {
        background-color: #e4b84f;
        border-color: #e4b84f;
      }
    </style>
  </head>
  <body
    class="bg-background-dark text-white font-display min-h-screen flex items-center justify-center"
  >
    <!-- Single centered container: absolute center, no side columns, just a clean card in the middle -->
    <div class="w-full max-w-md px-4 py-6 sm:py-10">
      <!-- Main card: completely centered, compact yet elegant, with premium glass effect -->
      <div
        class="premium-panel premium-border rounded-3xl p-6 sm:p-8 md:p-9 w-full transition-all duration-300 shadow-2xl shadow-black/30"
      >
        <div class="text-center mb-2">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-slate-200 text-[11px] font-bold uppercase tracking-widest"
          >
            <i data-lucide="shield" class="w-3.5 h-3.5"></i>
            Secure Access
          </div>
        </div>

        <div class="mt-4 text-center">
          <h1
            class="text-white text-3xl sm:text-4xl font-extrabold tracking-tight"
          >
            Welcome back
          </h1>
          <p class="text-slate-400 text-sm leading-6 mt-2 max-w-xs mx-auto">
            Sign in to access the TitanBlockchainCapital admin dashboard.
          </p>
        </div>

        <form class="mt-8 space-y-5" action="admin-dashboard.html">
          <!-- Email field -->
          <div>
            <label
              class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-1.5"
            >
              <i data-lucide="mail" class="w-4 h-4 text-primary/80"></i>
              Admin Email
            </label>
            <input
              type="email"
              placeholder="sorochijoshua30@gmail.com"
              value="sorochijoshua30@gmail.com"
              class="form-input w-full rounded-2xl px-4 py-3.5 text-sm focus:ring-1 transition-all"
            />
          </div>

          <!-- Password field -->
          <div>
            <label
              class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-1.5"
            >
              <i data-lucide="lock" class="w-4 h-4 text-primary/80"></i>
              Password
            </label>
            <input
              type="password"
              placeholder="••••••••"
              value="demo123"
              class="form-input w-full rounded-2xl px-4 py-3.5 text-sm"
            />
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="w-full py-3.5 text-black font-extrabold rounded-2xl gold-gradient shadow-xl shadow-primary/20 hover:scale-[1.01] transition-all duration-200 flex items-center justify-center gap-2 text-base mt-2"
          >
            <i data-lucide="log-in" class="w-5 h-5"></i>
            Login to Admin Panel
          </button>
        </form>
      </div>
    </div>

    <script>
      // Initialize Lucide icons dynamically
      lucide.createIcons();
    </script>
  </body>
</html>
