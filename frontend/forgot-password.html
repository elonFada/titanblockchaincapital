<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TitanBlockchainCapital | Forgot Password</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="manifest" href="images/site.webmanifest" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e4b84f",
              "background-dark": "#060913",
              "surface-dark": "#10172a",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Manrope", sans-serif;
        background:
          radial-gradient(
            circle at top right,
            rgba(228, 184, 79, 0.08),
            transparent 24%
          ),
          radial-gradient(
            circle at left 20%,
            rgba(75, 124, 255, 0.1),
            transparent 28%
          ),
          linear-gradient(180deg, #060913 0%, #070b14 45%, #09101b 100%);
      }

      .premium-panel {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.03)
        );
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .form-input {
        background: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: white !important;
      }

      .form-input::placeholder {
        color: rgb(148 163 184) !important;
      }

      .form-input:focus {
        border-color: rgba(228, 184, 79, 0.45) !important;
        box-shadow: 0 0 0 3px rgba(228, 184, 79, 0.08) !important;
        outline: none;
      }

      .gold-gradient {
        background: linear-gradient(
          135deg,
          #f6dea0 0%,
          #e4b84f 48%,
          #b47a15 100%
        );
      }
    </style>
  </head>

  <body class="min-h-screen bg-background-dark text-white font-display">
    <main class="min-h-screen flex items-center justify-center px-4 py-8">
      <div class="w-full max-w-md premium-panel rounded-3xl p-6 sm:p-8">
        <div class="text-center">
          <img
            src="images/logo.png"
            alt="Titan Logo"
            class="h-14 w-14 rounded-2xl object-cover mx-auto"
          />
          <h1 class="text-3xl font-black mt-5">Forgot Password</h1>
          <p class="text-slate-400 text-sm leading-7 mt-3">
            Enter your account email address and we will send you a verification
            code.
          </p>
        </div>

        <form id="forgotPasswordForm" class="mt-8 space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">
              Email Address
            </label>
            <input
              id="forgotEmail"
              type="email"
              placeholder="Enter your email"
              class="form-input w-full rounded-2xl px-4 py-4 text-sm"
            />
          </div>

          <button
            id="forgotPasswordSubmitBtn"
            type="submit"
            class="w-full py-4 text-black font-bold rounded-2xl gold-gradient"
          >
            Send Reset Code
          </button>
        </form>

        <div class="mt-6 text-center">
          <a href="login.html" class="text-primary text-sm font-semibold">
            Back to Login
          </a>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/forgot-password.js"></script>
  </body>
</html>
